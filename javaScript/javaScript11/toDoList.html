<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #F8F5F0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 60px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            width: 500px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .15);
        }

        h1 {
            text-align: center;
            color: #6F4E37;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input {
            flex: 1;
            padding: 12px;
            border: 2px solid #C9A66B;
            border-radius: 8px;
            font-size: 16px;
        }

        .input:focus {
            outline: none;
            border-color: #6F4E37;
        }

        .btn {
            padding: 12px 18px;
            border: none;
            background: #6F4E37;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: .3s;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .taskList {
            width: 100%;
            padding: 0;
            margin: 0;
        }

        .btn:hover {
            background: #553827;
        }

        .taskList {
            margin-top: 25px;
        }

        .taskName {
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #FDF8F3;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 5px solid #6F4E37;
        }

        .btnGroups {
            display: flex;
            gap: 8px;
        }

        .btnGroups button {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: .3s;
            font-size: 16px;
        }

        .up {
            background: #4CAF50;
            color: white;
        }

        .up:hover {
            background: #388E3C;
        }

        .down {
            background: #2196F3;
            color: white;
        }

        .down:hover {
            background: #1976D2;
        }

        .del {
            background: #E53935;
            color: white;
        }

        .del:hover {
            background: #C62828;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="input-section">
            <input class="input" type="text" placeholder="Enter your task📃">
            <button class="btn">Add Task</button>
        </div>
   

    <ul class="taskList">

    </ul>
     </div>

    <script>
        const inp = document.querySelector('.input')
        console.log(inp)

        const btn = document.querySelector('.btn')
        console.log(btn)

        const taskList = document.querySelector('.taskList')
        console.log(taskList)

        btn.addEventListener('click', () => {
            console.log(inp.value)
            let task = inp.value
            let li = document.createElement('li')
            // console.log(li.innerHTML)
            li.classList.add('taskName')
            li.innerHTML = `${task}
                          <span class = "btnGroups">
                          <button class ="up">👆</button>
                          <button class ="down">👇</button>
                          <button class ="del">❌</button>
                          </span>`
            taskList.appendChild(li)
            li.style.listStyle = "none"
            inp.value = ""
        })


        taskList.addEventListener('click' , (ev) => {
            let list = ev.target;
            // console.log(list)

            if(list.classList.contains('up')){
                let parentElement = list.parentElement.parentElement;
                console.log(parentElement);
                let previousElement = parentElement.previousElementSibling;
                console.log(previousElement);
                taskList.insertBefore(parentElement,previousElement);
            }
            else if(list.classList.contains('down')){
                let parentElement = list.parentElement.parentElement;
                console.log(parentElement);
                let nextElement = parentElement.nextElementSibling;
                console.log(nextElement);
                taskList.insertBefore(nextElement , parentElement);
            }
            else if(list.classList.contains('del')){
                let parentElement = list.parentElement.parentElement;
                console.log(parentElement);
                parentElement.remove();

            }

        })



    </script>
</body>

</html>
