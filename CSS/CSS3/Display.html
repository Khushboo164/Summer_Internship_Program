<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISPLAY_CSS</title>
    <style>
        h1{
            color: cornflowerblue;
        }
        button{
            display: block;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid blueviolet;
        }
        button:hover{
            background-color: cadetblue;
        }
        div{
            border: 1px solid black;
            margin: 5px;
            display: inline;
            padding: 3px;
            background-color: pink;
            border: 2px dotted palevioletred;
        }

        li{
            display: inline-block;
            width: 20px;
            color: brown;
        }
        /* p{
            display: none;
        } */
    </style>
</head>
<body>
    <h1>Learning display properties of css!</h1>
    <!-- applying block element to inline element -->
    <button>button1👆</button>
    <button>button2👆</button>
    <button>button3👆</button><br>

    <!-- block element to inline element-inline element does not have valid height and width property -->
    <div>
        Div1😉
    </div>
    <div>
        Div1🥰
    </div>
    <div>
        Div1🥱
    </div>

    <!-- block to inline-block-inline block has valid height and width property. -->
    
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
    </ul>

    <!-- applying display none to p- none removes the content 
     <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Nesciunt aperiam, aliquam fugiat obcaecati nulla maiores quas, sequi minima est non nisi, delectus ratione dolore possimus sint optio. Eum, molestias velit.</p> -->
</body>
</html>
