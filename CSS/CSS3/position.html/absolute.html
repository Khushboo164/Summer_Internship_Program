<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSITION PROPERTIES-CSS</title>
    <style>
        div{
            border: 2px solid cornflowerblue;
            margin: 20px;
            padding: 10px;
            height: 40px;
            width: 100px;
        }
        .abs{
            /* by default position property is static */
           position: absolute;  /* movers to reference with its top root page */
           top: 20px;  /* creates width from top of the screen */
           left: 200px; /* creates width from left of the screen */
        }
    </style>
</head>
<body>
    <div>
        hello
    </div>
    <div class="GP">
        <div class="p">
                <div>Hellooo! ^0^</div>
                <div class="abs">Hiiii! ~_~</div>
               <div>Heyyy! ^_^</div>
        </div>
    </div>
</body>
</html>
