<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSITION PROPERTIES-CSS</title>
    <style>
        div{
            border: 2px solid cornflowerblue;
            margin: 20px;
            padding: 10px;
            height: 40px;
            width: 100px;
        }
        .rel{
            /* by default position property is static */
           position: relative;  /* if we want to adjust the position and change it then we use relative along with top and left  */
           top: 5px;  /* creates width from top of the screen */
           left: 200px; /* creates width from left of the screen */
        }
    </style>
</head>
<body>
    <div>Hellooo! ^0^</div>
    <div class="rel">Hiiii! ~_~</div>
    <div>Heyyy! ^_^</div>
</body>
</html>
