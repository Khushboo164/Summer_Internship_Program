<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRANSFORM_TRANSITION_CSS</title>
    <style>
        .container{
            display: grid;
            gap: 20px;
        }
        .item{
            border: 1px solid black;
            height: 100px;
            width: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }
        .item1:hover{
            background-color: rgb(157, 157, 224);
            transform: translateX(100px);
            transition-duration: 3s;
            transition-timing-function: linear;
            transition-delay: 1s;
        }
        .item2:hover{
            background-color: rgb(231, 146, 174);
            /* transform: translateY(-20px); */
            transform: translateY(20px);
            /* transition-delay: 3s ; */
        }
        .item3:hover{
            background-color: lavender;
            transform: scale(1.2);
        }
        .item4:hover{
            background-color: rgb(251, 199, 251);
            /* transform: scaleY(1.2); */
            transform: scaleX(1.2);
        }
        .item5:hover{
            background-color: rgb(149, 225, 227);
            transform: translate(100px) scale(1.3) rotate(90deg);
            /* transform: rotate(40deg); */
            /* transform: rotateX(50deg); */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">BOX 1 </div>
        <div class="item item2">BOX 2</div>
        <div class="item item3">BOX 3</div>
        <div class="item item4">BOX 4</div>
        <div class="item item5">BOX 5</div>
    </div>
</body>
</html>
