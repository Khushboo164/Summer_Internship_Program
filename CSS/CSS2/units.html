<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 css</title>
    <style>
        #A{
        list-style-type: disc;
        font-size: 6vw;
        }
        #B{
        list-style-type: square;
        font-size: 160%;
        }
        #C{
        list-style-type: circle;
        font-size: 3em;
        }
        #D{
        list-style-type: georgian;
        font-size: 2rem;
        }
        #a{
        list-style-type: decimal;
        font-size: 20px;
        }
        #b{
        list-style-type: upper-roman;
        font-size: 0.8cm;
        }
        #c{
        list-style-type: lower-alpha;
        font-size: 9mm;
        }
        #d{
        list-style-type: lower-roman;
        font-size: 0.4in;
        }
    </style>
</head>
<body>
    <h1>Lists with CSS</h1>
    <ul><h2>Unordered List📃</h2>
        <li id="A">Selectors</li>
        <li id="B">Font-size</li>
        <li id="C">Color</li>
        <li id="D">Background-color</li>
    </ul>
    <ol><h2>Ordered List📃</h2>
       <li id="a">Selectors</li>
        <li id="b">Font-size</li>
        <li id="c">Color</li>
        <li id="d">Background-color</li>
    </ol>

</body>
</html>
