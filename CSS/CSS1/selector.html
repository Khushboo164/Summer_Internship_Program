<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
    <style>
        /* universal selector */
        *{
            background-color: rgb(249, 233, 212);
        }
         /*element selector*/
         h1{
            color:brown;
         }
         /* class selctor */
         .who{
            color: rgb(238, 110, 131);
             
         }
         /* id selector */
         #A{
            color: #b58eda
         }
         .Image{
            background-image: url(cute-baby-pink-bow-sticker-illustration-vector_976369-1140.avif);
            width: 300px;
            height: 300px;
            background-size: contain;
            background-repeat: no-repeat;
         }
         h2{
            color: #a27cc4;
         }
    </style>
</head>
<body>
    <h1>Welcome to My Web Page✌️</h1>
    <div class="who">
        <h3>Hello I,m Khushboo(❁´◡`❁)</h3>
    </div>
    <div id="A">
        Who are you?^_^
    </div><br>
    <div class="Image">

    </div><br>
    <div>
        <h2>About Me<3</h2>
    </div>
</body>
</html>
