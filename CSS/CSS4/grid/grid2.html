<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actual use of grid</title>
    <style>
        .container{
            display: grid;
            /* grid-template-columns: 1fr 1fr; */
            grid-template-areas: "nav nav nav" "side-content main-content main-content" "footer footer footer";
            
        }
        .items{
            border: 1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;

        }
        .item1{
            background-color: rgb(185, 185, 229);
            grid-area: nav;
        }
        .item2{
            background-color: rgb(185, 185, 229);
            grid-area: nav;
        }
        .item3{
            background-color: rgb(252, 188, 199);
            grid-area: side-content;
        }
        .item4{
            background-color: rgb(152, 247, 152);
            grid-area: main-content;
        }
        .item5{
            background-color: rgb(215, 150, 172);
            grid-area: footer;
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="items item1">Navbar</div>
    <div class="items item2">NavBar</div>
    <div class="items item3">Side-Content</div>
    <div class="items item4">Main-Content</div> 
    <div class="items item5">Footer</div>
    </div>
</body>
</html>
